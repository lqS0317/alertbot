# 占位 — 实际部署时由 kubeseal 用集群公钥加密真实 secret 生成。
# 这里给出一个**模板**，告诉运维该塞哪些 key。values.yaml 的 .secrets 决定 key 列表。
#
# 生成步骤：
#   echo -n "<real lark app secret>" | kubectl create secret generic \
#       alertbot-secrets --dry-run=client --from-file=larkAppSecret=/dev/stdin -o yaml \
#     | kubeseal --format yaml --controller-name sealed-secrets-controller > sealedsecret.yaml
#
# Phase 7 (T094) 把这步固化到 CI。
{{- if .Values.secrets.placeholderHelmRender }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "alertbot.fullname" . }}-secrets
spec:
  encryptedData: {}
{{- end }}
