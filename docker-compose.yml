services:
  postgres:
    image: postgres:16-alpine
    container_name: alertbot-postgres
    environment:
      POSTGRES_DB: alertbot
      POSTGRES_USER: alertbot
      POSTGRES_PASSWORD: alertbot
    ports:
      - "5432:5432"
    volumes:
      - alertbot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alertbot -d alertbot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  alertbot-postgres-data:
